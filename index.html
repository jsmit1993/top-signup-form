<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up form</title>
    <link rel="stylesheet" href="styles/stylesheet.css">
</head>
<body>
    <div class="left-side">
        <img class="fern" src="halie-west-25xggax4bSA-unsplash.jpg" width="300px">
        <div class="odinhead">
            <img class="odinshead" src="odin-lined.png" width="50px"> ODIN
        </div>
        <div class="photo">Photo by <a href="https://unsplash.com/@haliewestphoto?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Halie West</a> on <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a></div>
        
    </div>
    <div class="right-side">
        <div class="top-info">
            <div class="intro">This is not a real online service! You need something like this though in your life to help you realize your deepest dreams.</div>
            <div class="secondComment">You <em>know</em> you want to.</div>
        </div>
        <div class="form">
            <form class="sign-upForm">
                <legend>Let's Do this!</legend>
                <div class="names">
                    <div class="firstNames">
                        <label for="firstName">FIRST NAME</label>
                        <input type="text" id="firstName">
                    </div>
                    <div class="lastNames">
                        <label for="lastName">LAST NAME</label>
                        <input type="text" id="lastName">
                    </div>
                </div>
                <div class="contact">
                    <div class="emails">
                        <label for="email">EMAIL</label>
                        <input type="email" id="email">
                    </div>
                    <div class="phoneNumbers">
                        <label for="phoneNumber">PHONE NUMBER</label>
                        <input type="tel" id="phoneNumber">
                    </div>
                </div>
                <div class="passwords">
                    <div class="password">
                        <label for="password1">PASSWORD</label>
                        <input type="password" id="password1" required>
                    </div>
                    <div class="confirmPassword">
                        <label for="confirmPassword1">CONFIRM PASSWORD</label>
                        <input type="password" id="confirmPassword1" required>
                    </div>
                    <div class="passwordMatch"></div>
                </div>
                        
            </form>
        </div>
        <div class="button"><button class="createAccount">Create Account</button></div>
        <div class="member">Already have an account? <a class="logIn">Log in</a></div>
    </div>
    <script src="scripts/javascripts.js"></script>
</body>
</html>
